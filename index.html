      }

      /* ========== GLOBAL STYLES ========== */
      body { background: var(--bg); color: var(--text); transition: background 0.4s ease, color 0.4s ease; }

      input, textarea { transition: all 0.3s ease; }
      input:focus, textarea:focus {
        border-color: var(--input-border-focus) !important;
        box-shadow: 0 0 0 3px var(--input-ring);
        outline: none;
      }

      .custom-checkbox {
        appearance: none; -webkit-appearance: none;
        width: 1.25rem; height: 1.25rem;
        border: 2px solid var(--checkbox-border);
        border-radius: 0.375rem; cursor: pointer;
        position: relative; transition: all 0.2s ease; flex-shrink: 0;
      }
      .custom-checkbox:checked {
        background: var(--checkbox-gradient);
        border-color: var(--checkbox-color);
      }
      .custom-checkbox:checked::after {
        content: ''; position: absolute;
        left: 5px; top: 1px; width: 5px; height: 10px;
        border: solid white; border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }

      .task-card { animation: taskEnter 0.3s ease forwards; }

      .add-btn {
        background: var(--btn-add-bg);
        box-shadow: var(--btn-add-shadow);
        transition: all 0.3s ease;
      }
      .add-btn:hover {
        transform: translateY(-2px);
        box-shadow: var(--btn-add-hover-shadow);
      }
      .add-btn:active { transform: translateY(0); }

      .filter-btn { transition: all 0.3s ease; }
      .filter-btn.active {
        background: var(--filter-active-bg);
        color: var(--filter-color) !important;
        box-shadow: var(--filter-active-shadow);
      }
      .filter-btn:hover:not(.active) { background-color: var(--filter-hover); }

      .filter-counter {
        display: inline-block; border-radius: 999px;
        padding: 0 6px; font-size: 0.7rem; min-width: 18px;
        text-align: center; margin-left: 3px; vertical-align: middle;
        background: var(--filter-count-bg-inactive);
        color: var(--filter-count-color);
      }
      .filter-btn.active .filter-counter { background: var(--filter-count-bg); }

      .toast-container {
        position: fixed; top: 1rem; right: 1rem;
        z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem;
      }
      .toast { animation: toastIn 0.4s ease forwards; }

      .prazo-vencido  { background: linear-gradient(135deg, #ef4444, #f97316); color: white; }
      .prazo-proximo  { background: linear-gradient(135deg, #f59e0b, #eab308); color: white; }
      .prazo-futuro   { background: linear-gradient(135deg, #22c55e, #3b82f6); color: white; }

      .progress-fill {
        transition: width 0.5s ease;
        background: var(--progress-fill);
        background-size: 200% 100%;
        animation: gradient-shift 3s ease infinite;
      }

      #lista-scroll-container::-webkit-scrollbar { width: 5px; }
      #lista-scroll-container::-webkit-scrollbar-track { background: transparent; }
      #lista-scroll-container::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 999px; }
      #lista-scroll-container::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }

      /* Theme selector panel */
      #theme-panel {
        display: none;
        position: absolute; right: 0; top: calc(100% + 8px);
        background: var(--main-bg);
        border: 1px solid var(--main-border);
        border-radius: 12px; padding: 8px; z-index: 50;
        box-shadow: 0 10px 30px rgba(0,0,0,0.12);
        animation: slideDown 0.2s ease forwards;
      }
      #theme-panel.open { display: block; }
      .theme-option {
        display: flex; align-items: center; gap: 8px;
        padding: 8px 12px; border-radius: 8px; cursor: pointer;
        font-size: 0.8rem; font-weight: 500;
        white-space: nowrap; transition: background 0.2s;
        color: var(--text);
      }
      .theme-option:hover { background: var(--filter-hover); }
      .theme-option.active { background: var(--filter-bg); }
      .theme-dot {
        width: 18px; height: 18px; border-radius: 50%;
        border: 2px solid var(--main-border);
      }
    </style>
  </head>

  <body class="flex justify-center items-start pt-8 pb-12 min-h-screen">

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <main class="w-full max-w-sm lg:max-w-lg 2xl:max-w-2xl rounded-2xl shadow-xl p-6 mx-4 relative"
      style="background: var(--main-bg); border: 1px solid var(--main-border); box-shadow: var(--main-shadow); animation: slideDown 0.5s ease forwards;">

      <!-- Cabeçalho -->
      <header class="text-center mb-6 relative">
        <!-- Theme toggle -->
        <button id="theme-toggle-btn" class="theme-toggle-abs w-10 h-10 rounded-full flex items-center justify-center transition-all duration-300 shadow-sm"
          style="background: var(--theme-btn-bg); position: absolute; right: 0; top: 0;"
          title="Trocar tema">
          <i class="fas fa-palette" id="theme-icon" style="color: var(--theme-btn-icon);"></i>
        </button>

        <!-- Theme panel -->
        <div id="theme-panel">
          <div class="theme-option" data-theme-value="blue">
            <span class="theme-dot" style="background: linear-gradient(135deg, #3b82f6, #60a5fa); border-color: #3b82f6;"></span>
            Azul Claro
          </div>
          <div class="theme-option" data-theme-value="dark">
            <span class="theme-dot" style="background: #1e293b; border-color: #475569;"></span>
            Dark
          </div>
          <div class="theme-option" data-theme-value="gold-dark">
            <span class="theme-dot" style="background: linear-gradient(135deg, #1c1917, #fbbf24); border-color: #d97706;"></span>
            Dourado Dark
          </div>
          <div class="theme-option" data-theme-value="gold-light">
            <span class="theme-dot" style="background: linear-gradient(135deg, #fffbeb, #fbbf24); border-color: #d97706;"></span>
            Dourado Claro
          </div>
          <div class="theme-option" data-theme-value="mono">
            <span class="theme-dot" style="background: linear-gradient(135deg, #000000, #737373); border-color: #737373;"></span>
            Preto & Branco
          </div>
        </div>

        <h1 class="text-3xl font-extrabold mb-1" style="background: var(--heading-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
          <i class="fas fa-clipboard-check mr-2" style="color: var(--heading-icon); -webkit-text-fill-color: var(--heading-icon);"></i>EsToDoList
        </h1>
        <p style="color: var(--text-muted);" class="text-sm">Sua agenda virtual organizada</p>
      </header>

      <!-- Adicionar Tarefa -->
      <section class="mb-6">
        <div class="space-y-3">
          <div class="relative">
            <input type="text" id="nova-tarefa-input"
              placeholder="Digite o título da tarefa..."
              class="w-full p-3 pl-11 border rounded-xl text-slate-800 placeholder-slate-400 transition-all duration-300"
              style="background: var(--input-bg); border-color: var(--input-border); color: var(--input-text);">
            <i class="fas fa-pen-to-square absolute left-4 top-1/2 -translate-y-1/2" style="color: var(--input-icon);"></i>
          </div>
          <div class="relative">
            <textarea id="descricao-tarefa-input"
              placeholder="Adicione uma descrição (opcional)..."
              rows="2"
              class="w-full p-3 pl-11 border rounded-xl placeholder-slate-400 transition-all duration-300 resize-none"
              style="background: var(--input-bg); border-color: var(--input-border); color: var(--input-text);">
            </textarea>
            <i class="fas fa-align-left absolute left-4 top-4" style="color: var(--input-icon);"></i>
          </div>
          <button id="adicionar-tarefa-btn"
            class="add-btn w-full text-white py-3 rounded-xl font-semibold flex items-center justify-center"
            style="background: var(--btn-add-bg); box-shadow: var(--btn-add-shadow);">
            <i class="fas fa-plus mr-2"></i>Adicionar Tarefa
          </button>
        </div>
      </section>

      <!-- Pesquisa e Filtros -->
      <section class="mb-6">
        <div class="relative mb-4">
          <input type="text" id="pesquisar-input"
            placeholder="Pesquisar tarefas..."
            class="w-full px-4 py-3 pl-11 border rounded-xl placeholder-slate-400 transition-all duration-300"
            style="background: var(--input-bg); border-color: var(--input-border); color: var(--input-text);">
          <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2" style="color: var(--input-icon);"></i>
        </div>

        <div class="flex flex-wrap items-center gap-2">
          <span class="text-xs font-medium uppercase tracking-wide" style="color: var(--section-label);">Filtrar:</span>
          <div class="flex gap-1.5 flex-wrap">
            <button id="filtro-todas" class="filter-btn active px-4 py-2 rounded-full text-sm font-medium transition-colors"
              style="background: var(--filter-active-bg); color: var(--filter-color);">
              Todas <span id="contador-todas" class="filter-counter active"></span>
            </button>
            <button id="filtro-pendentes" class="filter-btn px-4 py-2 rounded-full text-sm font-medium transition-colors"
              style="background: var(--filter-bg); color: var(--text);">
              Pendentes <span id="contador-pendentes" class="filter-counter"></span>
            </button>
            <button id="filtro-concluidas" class="filter-btn px-4 py-2 rounded-full text-sm font-medium transition-colors"
              style="background: var(--filter-bg); color: var(--text);">
              Concluídas <span id="contador-concluidas" class="filter-counter"></span>
            </button>
            <button id="filtro-prazos" class="filter-btn px-4 py-2 rounded-full text-sm font-medium transition-colors"
              style="background: var(--filter-bg); color: var(--text);">
              Com Prazo <span id="contador-prazos" class="filter-counter"></span>
            </button>
          </div>
        </div>
      </section>

      <!-- Barra de Progresso -->
      <div class="mb-6">
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-xs font-medium" id="progresso-texto" style="color: var(--progress-text);">0 de 0 concluídas</span>
          <span class="text-xs font-bold" id="progresso-porcentagem" style="color: var(--progress-pct);">0%</span>
        </div>
        <div class="w-full h-2 rounded-full overflow-hidden" style="background: var(--progress-bg);">
          <div id="progresso-barra" class="progress-fill h-full rounded-full" style="width: 0%"></div>
        </div>
      </div>

      <!-- Lista de Tarefas -->
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold" style="color: var(--section-title);">
          <i class="fas fa-list-check mr-1.5 text-base" style="color: var(--section-title-icon);"></i>Suas Tarefas
        </h2>
        <span id="contador-tarefas" class="text-xs font-medium px-2.5 py-1 rounded-full"
          style="background: var(--counter-bg); color: var(--counter-text);">
          0 tarefas
        </span>
      </div>

      <div class="overflow-y-auto max-h-[45vh] pr-1 -mr-1" id="lista-scroll-container">
        <ul id="listas-de-tarefas" class="space-y-2.5">
        </ul>
      </div>

      <!-- Rodapé -->
      <footer class="mt-8 pt-4 text-center" style="border-top: 1px solid var(--footer-border);">
        <p class="text-xs" style="color: var(--footer-text);">
          Organize sua vida com <span class="font-semibold" style="color: var(--footer-accent);">EsToDoList</span>
        </p>
      </footer>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
